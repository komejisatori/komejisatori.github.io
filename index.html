<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your Name | Academic Homepage</title>
    <meta
      name="description"
      content="A simple academic homepage for GitHub Pages."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Newsreader:wght@400;500;700&family=Manrope:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="topbar">
        <a class="brand" href="#top" id="site-brand">Your Name</a>
        <nav class="nav-links">
          <a href="#news" id="nav-news">News</a>
          <a href="#publications" id="nav-publications">Publications</a>
        </nav>
      </header>

      <main id="top">
        <section class="intro-section" id="biography">
          <div class="portrait-column">
            <div class="portrait-frame">
              <img
                id="portrait-image"
                class="portrait-image"
                src="biography.png"
                alt="Profile photo"
              />
            </div>
            <div class="portrait-socials" id="portrait-socials"></div>
          </div>

          <div class="bio-column">
            <div class="bio-text" id="bio-text"></div>
          </div>
        </section>

        <section class="news-section" id="news">
          <div class="section-heading">
            <p class="section-label" id="news-label">Recent News</p>
          </div>

          <div class="news-list" id="news-list"></div>
        </section>

        <section class="publications-section" id="publications">
          <div class="section-heading">
            <p class="section-label" id="publications-label">Selected Publications</p>
          </div>

          <div class="publication-list" id="publication-list"></div>
        </section>

        <section class="visitor-map-section" id="visitor-map" hidden>
          <div class="visitor-map-embed" id="visitor-map-embed"></div>
        </section>
      </main>

      <footer class="footer">
        <p><span id="current-year"></span> <span id="footer-name">Your Name</span></p>
      </footer>
    </div>

    <script src="content.js"></script>
    <script src="main.js"></script>
  </body>
</html>
